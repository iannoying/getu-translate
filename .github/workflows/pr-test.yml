name: PR - Test & Build

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Check for eruda imports
        run: |
          if grep -r "import.*eruda" apps/extension/src/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" | grep -v ":.*[[:space:]]*//.*import.*eruda"; then
            echo "❌ Found uncommented eruda imports in the codebase!"
            echo "Please comment out or remove eruda imports before merging."
            exit 1
          else
            echo "✅ No uncommented eruda imports found."
          fi
        shell: bash

      - name: ESLint
        run: pnpm --filter @getu/extension lint

      - name: Type check
        run: pnpm --filter @getu/extension type-check

      - name: Build
        run: pnpm --filter @getu/extension build

      - name: Run tests
        run: pnpm --filter @getu/extension test --exclude="**/free-api.test.ts"

      - name: Install Playwright browsers
        run: pnpm --filter @getu/web exec playwright install --with-deps chromium

      - name: Web E2E
        run: pnpm --filter @getu/web test:e2e --project=chromium
