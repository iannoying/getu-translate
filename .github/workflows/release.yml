name: Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild assets for (e.g., v1.30.1)"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SKIP_ENV_VALIDATION: true
      HUSKY: 0
    steps:
      - name: Checkout Repo
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Checkout Release Tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Tag
        if: github.event_name != 'workflow_dispatch'
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          publish: pnpm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_FREE_API: true

      - name: Build and Zip Extension
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm --filter @getu/extension zip:all
        env:
          WXT_GOOGLE_CLIENT_ID: ${{ secrets.WXT_GOOGLE_CLIENT_ID || vars.WXT_GOOGLE_CLIENT_ID }}
          WXT_POSTHOG_API_KEY: ${{ secrets.WXT_POSTHOG_API_KEY || vars.WXT_POSTHOG_API_KEY }}
          WXT_POSTHOG_HOST: ${{ secrets.WXT_POSTHOG_HOST || vars.WXT_POSTHOG_HOST }}

      - name: Upload Extension Zip to Release
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
            TAG="v$VERSION"
          fi

          gh release upload "$TAG" apps/extension/output/*-chrome.zip apps/extension/output/*-edge.zip apps/extension/output/*-firefox.zip apps/extension/output/*-sources.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

