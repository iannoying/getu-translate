name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/contract/**'
      - 'packages/definitions/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      force_smoke_fail:
        description: "Set to true to force smoke test failure and exercise the auto-rollback path."
        type: boolean
        default: false

# Serialize deploys so 'capture-previous-version' + 'deploy' is atomic.
# Without this, a concurrent push could land between the two steps and our
# rollback target would be the wrong version.
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Order matters: setup-node MUST come before pnpm/action-setup so pnpm
      # uses the correct Node ABI for native binding (better-sqlite3) prebuilds.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      # Pre-install node-gyp so the rebuild step's `npx node-gyp` doesn't have
      # to fetch it interactively (which fails in non-tty CI shells).
      - name: Install node-gyp globally
        run: npm install -g node-gyp@12
      - name: Get pnpm store dir
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile

      # Force compile better-sqlite3 from source against the active Node ABI.
      # `pnpm rebuild` doesn't reliably pass --build-from-source to the install
      # script, so we use npm rebuild from the api package directory which
      # honors the flag. The "|| true" guards against the no-op case where
      # the binary is already the right ABI.
      - name: Rebuild better-sqlite3 from source
        working-directory: apps/api
        run: |
          set -e
          # Resolve the actual better-sqlite3 dir in pnpm's flat store
          BS3_DIR=$(node -e "console.log(require.resolve('better-sqlite3/package.json'))" | xargs dirname)
          echo "Rebuilding $BS3_DIR"
          cd "$BS3_DIR"
          # Remove cached prebuild + build artifacts
          rm -rf build prebuilds
          # Compile fresh against the current Node ABI (uses globally
          # installed node-gyp from the previous step).
          node-gyp rebuild --release
          ls -la build/Release/

      - name: Test
        run: pnpm --filter @getu/api test --run

      - name: Type-check
        run: pnpm --filter @getu/api type-check

      - name: Apply D1 migrations to production
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply DB --remote --env production

      - name: Capture previous Worker version id (for rollback)
        id: prev-version
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # `wrangler versions list --json` returns newest-first.
          # The first item is the version currently live in production
          # (immediately about to become "previous" after the next deploy).
          set -euo pipefail
          PREV=$(pnpm exec wrangler versions list --env production --json 2>/dev/null \
                 | node -e "
                   let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{
                     const arr=JSON.parse(s);
                     if(!Array.isArray(arr)||arr.length===0){console.error('no versions');process.exit(2)}
                     console.log(arr[0].id);
                   });
                 " || true)
          if [ -z "$PREV" ]; then
            echo "Could not determine previous version id; rollback will be unavailable."
            echo "previous=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Previous version id: $PREV"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"

      - name: Deploy worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env production

      - name: Run smoke test
        id: smoke
        continue-on-error: true
        working-directory: apps/api
        env:
          API_BASE_URL: https://api.getutranslate.com
          SMOKE_FORCE_FAIL: ${{ inputs.force_smoke_fail || 'false' }}
        run: pnpm smoke:prod

      - name: Rollback worker if smoke failed
        id: rollback
        if: steps.smoke.outcome == 'failure' && steps.prev-version.outputs.previous != ''
        continue-on-error: true
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PREV='${{ steps.prev-version.outputs.previous }}'
          echo "Rolling back to version $PREV"
          pnpm exec wrangler rollback \
            --env production \
            --version-id "$PREV" \
            --message "auto-rollback: smoke test failed in run ${{ github.run_id }}"

      - name: Fail the job after rollback
        if: steps.smoke.outcome == 'failure'
        run: |
          if [ "${{ steps.rollback.outcome }}" = "success" ]; then
            echo "::error::Smoke test failed; worker rolled back to previous version (${{ steps.prev-version.outputs.previous }})."
          elif [ "${{ steps.rollback.outcome }}" = "skipped" ]; then
            echo "::error::Smoke test failed; rollback skipped (no previous version captured). Production may be on the bad version — manual rollback required."
          else
            echo "::error::Smoke test failed AND rollback ALSO failed. Production is on the bad version. URGENT: manual rollback required immediately."
          fi
          exit 1
