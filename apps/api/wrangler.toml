name = "getu-api"
main = "src/worker.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 3 * * *"]

[dev]
port = 8788

# Default (local dev via `wrangler dev`) — localhost values so `secure: false` cookies are issued
[[d1_databases]]
binding = "DB"
database_name = "getu-translate"
database_id = "903fa2ef-2aaa-4f20-b3a7-a2ef59a8cb70"
migrations_dir = "../../packages/db/drizzle"

[vars]
AUTH_BASE_URL = "http://localhost:8788"
ALLOWED_EXTENSION_ORIGINS = "chrome-extension://*,http://localhost:3000,https://getutranslate.com,https://www.getutranslate.com"
BIANXIE_BASE_URL = "https://api.bianxie.ai/v1"
# FLIP TO "true" ONLY after Paddle vendor approval + webhook handler live
BILLING_ENABLED = "false"
PADDLE_BASE_URL = "https://sandbox-api.paddle.com"

# Production deploy — invoked via `wrangler deploy --env production`
[env.production]
name = "getu-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "getu-translate"
database_id = "903fa2ef-2aaa-4f20-b3a7-a2ef59a8cb70"
migrations_dir = "../../packages/db/drizzle"

[env.production.vars]
AUTH_BASE_URL = "https://api.getutranslate.com"
ALLOWED_EXTENSION_ORIGINS = "chrome-extension://*,https://getutranslate.com,https://www.getutranslate.com"
BIANXIE_BASE_URL = "https://api.bianxie.ai/v1"
# FLIP TO "true" ONLY after Paddle vendor approval + webhook handler live
BILLING_ENABLED = "false"
# stays on sandbox until paddle vendor approval — flip to https://api.paddle.com then
PADDLE_BASE_URL = "https://sandbox-api.paddle.com"
