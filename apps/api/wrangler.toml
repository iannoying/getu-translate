name = "getu-api"
main = "src/worker.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 3 * * *"]

[dev]
port = 8788

# Default (local dev via `wrangler dev`) — localhost values so `secure: false` cookies are issued
[[d1_databases]]
binding = "DB"
database_name = "getu-translate"
database_id = "903fa2ef-2aaa-4f20-b3a7-a2ef59a8cb70"
migrations_dir = "../../packages/db/drizzle"

# M6.8 — R2 bucket for PDF source + output objects (pdfs/{userId}/{jobId}/...)
# Created out-of-band: `wrangler r2 bucket create getu-pdfs`
[[r2_buckets]]
binding = "BUCKET_PDFS"
bucket_name = "getu-pdfs"

# M7-A2 — KV namespace for edge rate limit (dev / preview)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "773ace9429844510936b75cd92d0ca9d"

# M6.8 — Cloudflare Queue for PDF translation jobs.
# `documentCreate` enqueues `{ jobId }`; the consumer worker (M6.9) drains it.
# Created out-of-band: `wrangler queues create getu-translate-jobs`
[[queues.producers]]
binding = "TRANSLATE_QUEUE"
queue = "getu-translate-jobs"

# Queue consumer (M6.9): drains jobs enqueued by documentCreate / documentFromUrl,
# runs the translation pipeline, writes segments.json to R2.
[[queues.consumers]]
queue = "getu-translate-jobs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
# DLQ disabled for M6.9; revisit when retry analytics land in M6.13.
# dead_letter_queue = "getu-translate-jobs-dlq"

[vars]
AUTH_BASE_URL = "http://localhost:8788"
ALLOWED_EXTENSION_ORIGINS = "chrome-extension://*,http://localhost:3000,https://getutranslate.com,https://www.getutranslate.com"
BIANXIE_BASE_URL = "https://api.bianxie.ai/v1"
# FLIP TO "true" ONLY after Paddle vendor approval + webhook handler live
BILLING_ENABLED = "false"
PADDLE_BASE_URL = "https://sandbox-api.paddle.com"
STRIPE_BASE_URL = "https://api.stripe.com"
# Phase 6: passwordless + passkey
# RESEND_API_KEY is a secret — set via `wrangler secret put RESEND_API_KEY`.
# Without it sendEmail logs the OTP to the worker console (dev fallback).
EMAIL_FROM = "GetU Translate <noreply@getutranslate.com>"
WEBAUTHN_RP_ID = "localhost"
WEBAUTHN_ORIGINS = "http://localhost:3000,http://localhost:8788"
# M7-B3 — spend monitor thresholds. SLACK_WEBHOOK_URL is a secret, not a var.
SPEND_ALERT_AI_TRANSLATE_PER_DAY = "100000"
SPEND_ALERT_WEB_TEXT_TRANSLATE_PER_DAY = "50000"
SPEND_ALERT_WEB_TEXT_TRANSLATE_TOKENS_PER_DAY = "500000"
SPEND_ALERT_DOCUMENT_PAGES_PER_DAY = "200"
SPEND_ALERT_AI_RATE_LIMIT_WRITES_PER_DAY = "20000"

# Production deploy — invoked via `wrangler deploy --env production`
[env.production]
name = "getu-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "getu-translate"
database_id = "903fa2ef-2aaa-4f20-b3a7-a2ef59a8cb70"
migrations_dir = "../../packages/db/drizzle"

[[env.production.r2_buckets]]
binding = "BUCKET_PDFS"
bucket_name = "getu-pdfs"

# M7-A2 — KV namespace for edge rate limit (production)
[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "1228aeb64f0b44c4af844d03dc9eaa84"

[[env.production.queues.producers]]
binding = "TRANSLATE_QUEUE"
queue = "getu-translate-jobs"

# Queue consumer (M6.9): production binding mirrors default above.
[[env.production.queues.consumers]]
queue = "getu-translate-jobs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
# dead_letter_queue = "getu-translate-jobs-dlq"

[env.production.vars]
AUTH_BASE_URL = "https://api.getutranslate.com"
ALLOWED_EXTENSION_ORIGINS = "chrome-extension://*,https://getutranslate.com,https://www.getutranslate.com"
BIANXIE_BASE_URL = "https://api.bianxie.ai/v1"
# Stripe live (Phase 5 S6) — Paddle still pending vendor approval (sandbox only)
BILLING_ENABLED = "true"
# stays on sandbox until paddle vendor approval — flip to https://api.paddle.com then
PADDLE_BASE_URL = "https://sandbox-api.paddle.com"
STRIPE_BASE_URL = "https://api.stripe.com"
# Phase 6: passwordless + passkey (set RESEND_API_KEY via `wrangler secret put RESEND_API_KEY --env production`)
EMAIL_FROM = "GetU Translate <noreply@getutranslate.com>"
WEBAUTHN_RP_ID = "getutranslate.com"
WEBAUTHN_ORIGINS = "https://getutranslate.com,https://www.getutranslate.com"
# M7-B3 — spend monitor thresholds. SLACK_WEBHOOK_URL is a secret, not a var.
SPEND_ALERT_AI_TRANSLATE_PER_DAY = "100000"
SPEND_ALERT_WEB_TEXT_TRANSLATE_PER_DAY = "50000"
SPEND_ALERT_WEB_TEXT_TRANSLATE_TOKENS_PER_DAY = "500000"
SPEND_ALERT_DOCUMENT_PAGES_PER_DAY = "200"
SPEND_ALERT_AI_RATE_LIMIT_WRITES_PER_DAY = "20000"
